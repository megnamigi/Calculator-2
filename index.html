<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="calculator">
    <div class="display">
        <div id="screen">0</div>
    </div>
    
    <div class="top-row">
        <button class="small-btn" onclick="correct()">CORRECT</button>
        <button class="small-btn" onclick="replay()">REPLAY</button>
        <button class="small-btn">CHECK →</button>
        <button class="small-btn">CHECK ←</button>
    </div>

    <div class="buttons">
        <button class="black-btn" onclick="turnOff()">OFF</button>
        <button class="black-btn" onclick="percent()">%</button>
        <button class="black-btn" onclick="markup()">MU</button>
        <button class="black-btn" onclick="memoryRecall()">MRC</button>
        <button class="black-btn" onclick="memoryMinus()">M-</button>
        <button class="black-btn" onclick="memoryPlus()">M+</button>

        <button class="black-btn" onclick="grandTotal()">GT</button>
        <button class="num-btn" onclick="append('7')">7</button>
        <button class="num-btn" onclick="append('8')">8</button>
        <button class="num-btn" onclick="append('9')">9</button>
        <button class="black-btn" onclick="sqrt()">√</button>
        <button class="black-btn" onclick="toggleSign()">+/-</button>

        <button class="black-btn" onclick="backspace()">→</button>
        <button class="num-btn" onclick="append('4')">4</button>
        <button class="num-btn" onclick="append('5')">5</button>
        <button class="num-btn" onclick="append('6')">6</button>
        <button class="black-btn" onclick="setOp('*')">×</button>
        <button class="black-btn" onclick="setOp('/')">÷</button>

        <button class="red-btn" onclick="turnOn()">AC</button>
        <button class="num-btn" onclick="append('1')">1</button>
        <button class="num-btn" onclick="append('2')">2</button>
        <button class="num-btn" onclick="append('3')">3</button>
        <button class="black-btn tall" onclick="setOp('+')">+</button>
        <button class="black-btn" onclick="setOp('-')">-</button>

        <button class="num-btn" onclick="append('0')">0</button>
        <button class="num-btn" onclick="append('00')">00</button>
        <button class="num-btn" onclick="append('000')">000</button>
        <button class="num-btn" onclick="append('.')">.</button>
        <button class="black-btn" onclick="calculate()">=</button>
    </div>
</div>
<script src="index.js"></script>
</body>
</html>
